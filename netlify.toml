# Cấu hình build & deploy cho Netlify
# Astro build mặc định ra thư mục dist/

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Forms (cho trang Liên hệ) — bật sẵn
[[redirects]]
  from = "/admin"
  to   = "/admin/"
  status = 301

# Tăng cache cho asset tĩnh
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
